<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1A5276">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>PTFI Waste Bin</title>
<script src="https://unpkg.com/@zxing/library@0.18.6/umd/index.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh;}
.page{display:none;min-height:100vh;flex-direction:column}
.page.active{display:flex}

/* Header */
.header{background:#1A5276;color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.header-icon{width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:8px}
.header-icon:active{background:rgba(255,255,255,0.15)}
.header h1{font-size:16px;font-weight:500;flex:1}
.header p{font-size:11px;opacity:0.75;margin-top:1px}

/* Content */
.content{flex:1;padding:16px;max-width:480px;margin:0 auto;width:100%}

/* Home scan area */
.scan-card{background:#fff;border-radius:16px;padding:20px 16px;margin-bottom:14px;border:0.5px solid #e0e0e0}
.scan-zone{border:1.5px dashed #ccc;border-radius:12px;padding:28px 16px;text-align:center;cursor:pointer;transition:background 0.15s;}
.scan-zone:active{background:#f5f5f5}
.scan-zone .big-icon{font-size:44px;margin-bottom:10px;display:block}
.scan-zone h2{font-size:15px;font-weight:500;color:#222;margin-bottom:4px}
.scan-zone p{font-size:12px;color:#888}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.15s}
.btn:active{transform:scale(0.98)}
.btn-primary{background:#1A5276;color:#fff}
.btn-secondary{background:#f5f5f5;color:#333;border:0.5px solid #e0e0e0}
.divider{display:flex;align-items:center;gap:10px;margin:14px 0}
.divider hr{flex:1;border:none;border-top:1px solid #eee}
.divider span{font-size:12px;color:#aaa;white-space:nowrap}
.input-row{display:flex;gap:8px}
.input-row input{flex:1;padding:11px 12px;border:1px solid #ddd;border-radius:10px;font-size:14px;outline:none}
.input-row input:focus{border-color:#1A5276}
.input-row .btn{width:auto;padding:11px 18px}

/* Video */
#video-wrap{position:relative;background:#000;border-radius:12px;overflow:hidden;margin-bottom:12px;display:none}
#video{width:100%;display:block;max-height:260px;object-fit:cover}
.scan-line{position:absolute;left:8%;right:8%;height:2px;background:#2ECC71;top:50%;animation:scanAnim 1.8s ease-in-out infinite;box-shadow:0 0 6px #2ECC71}
@keyframes scanAnim{0%,100%{top:25%}50%{top:75%}}
.scan-corner{position:absolute;width:20px;height:20px;border-color:#fff;border-style:solid;border-width:0}
.tl{top:8px;left:8px;border-top-width:2px;border-left-width:2px}
.tr{top:8px;right:8px;border-top-width:2px;border-right-width:2px}
.bl{bottom:8px;left:8px;border-bottom-width:2px;border-left-width:2px}
.br{bottom:8px;right:8px;border-bottom-width:2px;border-right-width:2px}

/* Detail page */
.bin-hero{background:#fff;border-radius:16px;padding:20px 16px;margin-bottom:12px;border:0.5px solid #e0e0e0}
.bin-code{font-size:36px;font-weight:600;letter-spacing:2px;margin-bottom:4px}
.bin-location{font-size:14px;color:#555;display:flex;align-items:center;gap:6px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.info-item{background:#f8f8f8;border-radius:10px;padding:12px}
.info-label{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
.info-value{font-size:14px;font-weight:500;color:#222}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500}
.badge-hijau{background:#D5F5E3;color:#1E8449}
.badge-kuning{background:#FEF9E7;color:#9A7D0A}
.badge-merah{background:#FDEDEC;color:#C0392B}
.badge-biru{background:#EBF5FB;color:#1A5276}
.badge-b3{background:#FDEDEC;color:#C0392B}
.badge-nonb3{background:#EBF5FB;color:#1A5276}
.not-found{background:#fff;border-radius:16px;padding:40px 20px;text-align:center;border:0.5px solid #e0e0e0}
.not-found .nf-icon{font-size:48px;margin-bottom:12px}
.not-found h2{font-size:16px;font-weight:500;color:#333;margin-bottom:6px}
.not-found p{font-size:13px;color:#888}
.home-btn-wrap{margin-top:12px}
</style>
</head>
<body>

<!-- ===== HOME PAGE ===== -->
<div class="page active" id="page-home">
  <div class="header">
    <div>
      <h1>🗑️ PTFI Waste Bin</h1>
      <p>Smelter & PMR Site Scanner</p>
    </div>
  </div>
  <div class="content">
    <div class="scan-card">
      <div id="video-wrap">
        <video id="video" playsinline autoplay muted></video>
        <div class="scan-line"></div>
        <div class="scan-corner tl"></div>
        <div class="scan-corner tr"></div>
        <div class="scan-corner bl"></div>
        <div class="scan-corner br"></div>
      </div>
      <div id="scan-zone-ui" class="scan-zone" onclick="startCamera()">
        <span class="big-icon">📷</span>
        <h2>Scan Barcode</h2>
        <p>Tap untuk aktifkan kamera dan scan barcode pada waste bin</p>
      </div>
      <div style="margin-top:12px">
        <button class="btn btn-primary" id="cam-btn" onclick="toggleCamera()" style="display:none">⏹ Stop Kamera</button>
      </div>
      <div class="divider"><hr><span>atau cari manual</span><hr></div>
      <div class="input-row">
        <input type="text" id="search-input" placeholder="Ketik kode bin, contoh: 1-A" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')goDetail(this.value.trim())">
        <button class="btn btn-primary" onclick="goDetail(document.getElementById('search-input').value.trim())">Cari</button>
      </div>
    </div>
    <div style="text-align:center;font-size:11px;color:#bbb;margin-top:8px">PTFI Smelter & PMR · Waste Management System</div>
  </div>
</div>

<!-- ===== DETAIL PAGE ===== -->
<div class="page" id="page-detail">
  <div class="header">
    <div class="header-icon" onclick="goHome()" title="Kembali ke Home">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <div>
      <h1>Detail Waste Bin</h1>
      <p>PTFI Smelter & PMR Site</p>
    </div>
  </div>
  <div class="content">
    <div id="detail-content"></div>
    <div class="home-btn-wrap">
      <button class="btn btn-secondary" onclick="goHome()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Kembali ke Home
      </button>
    </div>
  </div>
</div>

const WARNA = {
  Hijau:  {bg:"#D5F5E3",color:"#1E8449",icon:"♻️",cls:"badge-hijau"},
  Kuning: {bg:"#FEF9E7",color:"#9A7D0A",icon:"📦",cls:"badge-kuning"},
  Merah:  {bg:"#FDEDEC",color:"#C0392B",icon:"⚠️",cls:"badge-merah"},
  Biru:   {bg:"#EBF5FB",color:"#1A5276",icon:"🔵",cls:"badge-biru"},
};

let cameraActive = false;
let codeReader = null;

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function goHome() {
  stopCamera();
  showPage('page-home');
}

function goDetail(id) {
  if(!id) return;
  id = id.trim().toUpperCase();
  const bin = BINS[id];
  const el = document.getElementById('detail-content');
  if(bin) {
    const w = WARNA[bin.warna] || {bg:"#f0f0f0",color:"#333",icon:"🗑️",cls:""};
    const b3 = bin.b3;
    el.innerHTML = `
      <div class="bin-hero">
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:4px">
          <div style="width:56px;height:56px;border-radius:14px;background:${w.bg};display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0">${w.icon}</div>
          <div>
            <div class="bin-code" style="color:${w.color}">${id}</div>
            <div class="bin-location">📍 ${bin.nama}</div>
          </div>
        </div>
        <div class="info-grid">
          <div class="info-item">
            <div class="info-label">Area</div>
            <div class="info-value">Area ${bin.area}</div>
          </div>
          <div class="info-item">
            <div class="info-label">Ukuran</div>
            <div class="info-value">${bin.ukuran}</div>
          </div>
          <div class="info-item">
            <div class="info-label">Warna Bin</div>
            <div class="info-value"><span class="badge ${w.cls}">${bin.warna}</span></div>
          </div>
          <div class="info-item">
            <div class="info-label">Kategori</div>
            <div class="info-value"><span class="badge ${b3?'badge-b3':'badge-nonb3'}">${b3?'B3':'Non-B3'}</span></div>
          </div>
          <div class="info-item" style="grid-column:1/-1">
            <div class="info-label">Lokasi</div>
            <div class="info-value" style="font-size:15px">${bin.nama}</div>
          </div>
        </div>
      </div>`;
  } else {
    el.innerHTML = `
      <div class="not-found">
        <div class="nf-icon">😕</div>
        <h2>Bin tidak ditemukan</h2>
        <p>Kode <strong>${id}</strong> tidak ada dalam database.<br>Periksa kode dan coba lagi.</p>
      </div>`;
  }
  showPage('page-detail');
}

async function startCamera() {
  document.getElementById('scan-zone-ui').style.display='none';
  document.getElementById('cam-btn').style.display='flex';
  document.getElementById('video-wrap').style.display='block';
  cameraActive = true;
  try {
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[ZXing.BarcodeFormat.CODE_128,ZXing.BarcodeFormat.QR_CODE,ZXing.BarcodeFormat.DATA_MATRIX]);
    codeReader = new ZXing.BrowserMultiFormatReader(hints);
    const devices = await ZXing.BrowserMultiFormatReader.listVideoInputDevices();
    const back = devices.find(d=>/back|rear|environment/i.test(d.label))||devices[devices.length-1];
    await codeReader.decodeFromVideoDevice(back?.deviceId,'video',(result,err)=>{
      if(result){
        stopCamera();
        goDetail(result.getText());
      }
    });
  } catch(e) {
    alert('Kamera tidak dapat diakses. Gunakan input manual.');
    stopCamera();
  }
}

function toggleCamera() {
  if(cameraActive) stopCamera(); else startCamera();
}

function stopCamera() {
  if(codeReader){codeReader.reset();codeReader=null;}
  cameraActive=false;
  document.getElementById('video-wrap').style.display='none';
  document.getElementById('cam-btn').style.display='none';
  document.getElementById('scan-zone-ui').style.display='block';
}

// Handle URL param ?id=1-A on load
window.addEventListener('load',()=>{
  const p = new URLSearchParams(window.location.search);
  const id = p.get('id');
  if(id) goDetail(id);
});
</script>
